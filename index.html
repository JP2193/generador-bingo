<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo — Clara & Javier</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="bingo_style.css">
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('generate')">✦ Generar</button>
  <button class="tab-btn"        onclick="switchTab('frases')">📝 Frases</button>
  <button class="tab-btn"        onclick="switchTab('calibrate')">⚙ Calibrar</button>
</div>

<!-- ══════════════ TAB: GENERAR ══════════════ -->
<div id="tab-generate" class="tab-content active">

  <div class="card">
    <h2>Distribución</h2>
    <p class="dist-hint">Deben sumar 24</p>
    <div class="dist-row">
      <div class="dist-item"><label>🟢 Fáciles</label><input type="number" id="nFacil" value="14" min="0" max="24"></div>
      <div class="dist-item"><label>🟡 Medias</label><input type="number" id="nMedia" value="7" min="0" max="24"></div>
      <div class="dist-item"><label>🔴 Difíciles</label><input type="number" id="nDificil" value="3" min="0" max="24"></div>
    </div>
    <div class="btn-grid">
      <button class="btn btn-primary" onclick="generarTarjeta()">✦ Generar tarjeta</button>
      <button class="btn btn-outline" onclick="generarTarjeta()">↺ Otra aleatoria</button>
      <button class="btn btn-gold"    onclick="guardarImagen()">💾 Guardar</button>
      <div class="lote-group">
        <button class="btn btn-outline lote-export-btn" onclick="generarLote()">🗂 Exportar lote</button>
        <div class="stepper">
          <button class="stepper-btn" onclick="cambiarLote(-10)">−</button>
          <span id="loteCount" class="stepper-value">50</span>
          <button class="stepper-btn" onclick="cambiarLote(10)">+</button>
        </div>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div id="progressMsg" style="display:none; margin-top:10px; font-size:0.82rem; color:#593636;"></div>
  </div>

  <div id="previewArea" style="display:none">
    <div class="card-wrapper" id="cardWrapper">
      <img class="card-bg" src="img/3.png" alt="fondo tarjeta">
      <div class="grid-overlay" id="gridOverlay"></div>
    </div>
  </div>

</div><!-- /tab-generate -->

<!-- ══════════════ TAB: FRASES ══════════════ -->
<div id="tab-frases" class="tab-content">

  <div class="card">
    <h2>Frases <span id="frasesBadge" style="font-size:0.7rem; font-weight:400; color:#888; text-transform:none; letter-spacing:0; margin-left:6px;"></span></h2>
    <div class="btn-row" style="margin-bottom:16px;">
      <button class="btn btn-primary btn-sm" onclick="agregarFila()">➕ Agregar frase</button>
      <button id="btnGuardarFrases" class="btn btn-gold btn-sm" onclick="guardarFrases()">💾 Guardar cambios</button>
      <button class="btn btn-outline btn-sm" onclick="resetearFrases()">↩ Resetear</button>
    </div>
    <p id="totalFrases" class="total-frases-label"></p>
    <div id="tablaContainer"></div>
    <div id="frasesMsg" style="display:none; margin-top:10px; font-size:0.82rem; border-radius:8px; padding:9px 13px;"></div>
  </div>

</div><!-- /tab-frases -->

<!-- ══════════════ TAB: CALIBRAR ══════════════ -->
<div id="tab-calibrate" class="tab-content">

  <div class="card">
    <h2>Calibrar posición de la grilla <span class="saved-badge" id="savedBadge" style="display:none">✓ Guardado</span></h2>
    <p style="font-size:0.75rem; color:#999; margin-bottom:14px;">Ajustá los sliders hasta que la grilla roja coincida con el área de celdas. Guardá y los valores se usan en el modo Generar.</p>

    <div class="calib-layout">
      <div class="calib-controls">

        <div class="slider-group">
          <label>top (%) <span id="dTop">32.1</span>%</label>
          <input type="range" id="cTop" min="15" max="50" step="0.1" value="32.1">
        </div>
        <div class="slider-group">
          <label>left (%) <span id="dLeft">6.1</span>%</label>
          <input type="range" id="cLeft" min="-10" max="20" step="0.1" value="6.1">
        </div>
        <div class="slider-group">
          <label>width (%) <span id="dWidth">88.4</span>%</label>
          <input type="range" id="cWidth" min="50" max="115" step="0.1" value="88.4">
        </div>
        <div class="slider-group">
          <label>height (%) <span id="dHeight">64.9</span>%</label>
          <input type="range" id="cHeight" min="20" max="85" step="0.1" value="64.9">
        </div>
        <div class="slider-group">
          <label>font size (px) <span id="dFont">11.5</span>px</label>
          <input type="range" id="cFont" min="4" max="18" step="0.5" value="11.5">
        </div>
        <div class="slider-group">
          <label>color bordes <input type="color" id="cBorderColor" value="#dc3232" style="width:36px; height:20px; border:none; padding:0; cursor:pointer; vertical-align:middle;"></label>
        </div>
        <div class="slider-group">
          <label>opacidad <span id="dBorderAlpha">0.60</span></label>
          <input type="range" id="cBorderAlpha" min="0" max="1" step="0.05" value="0.6">
        </div>

        <div style="margin-top: 14px; display:flex; flex-direction:column; gap:6px;">
          <button class="btn btn-gold btn-sm" onclick="guardarCalib()">💾 Guardar valores</button>
          <button class="btn btn-outline btn-sm" onclick="toggleCalibGrid()">👁 Ocultar/mostrar guías</button>
          <button class="btn btn-outline btn-sm" onclick="toggleCalibBorders()">▦ Ocultar/mostrar bordes</button>
          <button class="btn btn-outline btn-sm" onclick="resetearCalib()">↩ Valores por defecto</button>
        </div>

        <div class="success-msg" id="saveMsg">✅ Valores guardados</div>
      </div>

      <div class="calib-preview">
        <div class="calib-card-wrapper">
          <img class="calib-card-bg" src="img/3.png" alt="fondo tarjeta">
          <div class="calib-grid" id="calibGrid"></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /tab-calibrate -->

<script src="bingo_app.js"></script>
</body>
</html>
